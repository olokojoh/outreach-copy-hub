          angles: [

            "It helps readers understand what Lyon is like before they move into narrower planning pages, which reduces travel-planning friction.",
            "Because it is structured for Japanese-language readers, it works well as a homepage that guides first-time visitors into the right topic next.",

      const rows = document.getElementById("rows");
      const status = document.getElementById("status");
      const keywordChips = document.getElementById("keyword-chips");
      const intentChips = document.getElementById("intent-chips");
      const state = {
        language: "zh"
      };
      const randomState = {
        plain: { order: [], cursor: 0 },
        anchor: { order: [], cursor: 0 },
        rendered: { order: [], cursor: 0 },
        rich: { order: [], cursor: 0 }
      };

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function getSavedLanguage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved === "en" ? "en" : "zh";
      }

      function t() {
        return copyCatalog[state.language];
      }

      function buildEntries() {
        return t().openers.flatMap((lead) =>
          t().angles.map((angle) => ({
            plain: `${lead} ${t().keyword}: ${targetUrl} ${angle}`,
            anchor: `${lead} <a href="${targetUrl}">${t().keyword}</a>. ${angle}`,
            rendered: `${lead} ${t().keyword}. ${angle}`,
            richText: `${lead} ${t().keyword}. ${angle}`,
            richHtml: `${escapeHtml(lead)} <a href="${targetUrl}">${escapeHtml(t().keyword)}</a>. ${escapeHtml(angle)}`
          }))
        );
      }

      function getEntries() {
        return buildEntries();
      }

      function setStatus(message = t().initialStatus) {
        status.textContent = message;
      }

      async function copyText(text, message) {
        try {
          await navigator.clipboard.writeText(text);
          setStatus(message);
        } catch (error) {
          setStatus(t().copyFailure(message));
        }
      }

      async function copyRichText(html, plainText, message) {
        try {
          if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
            const item = new ClipboardItem({
              "text/html": new Blob([html], { type: "text/html" }),
              "text/plain": new Blob([plainText], { type: "text/plain" })
            });
            await navigator.clipboard.write([item]);
          } else {
            await navigator.clipboard.writeText(plainText);
          }
          setStatus(message);
        } catch (error) {
          try {
            await navigator.clipboard.writeText(plainText);
            setStatus(t().copyFallback(message));
          } catch (fallbackError) {
            setStatus(t().copyFailure(message));
          }
        }
      }

      function createShuffledIndexes(length) {
        const order = Array.from({ length }, (_, index) => index);

        for (let index = order.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [order[index], order[swapIndex]] = [order[swapIndex], order[index]];
        }

        return order;
      }

      function getNextRandomEntry(column) {
        const bucket = getEntries();
        const stateBucket = randomState[column];

        if (!bucket.length) {
          return null;
        }

        if (stateBucket.order.length !== bucket.length || stateBucket.cursor >= stateBucket.order.length) {
          const previousIndex =
            stateBucket.order.length && stateBucket.cursor > 0
              ? stateBucket.order[stateBucket.cursor - 1]
              : null;

          stateBucket.order = createShuffledIndexes(bucket.length);
          stateBucket.cursor = 0;

          if (bucket.length > 1 && previousIndex !== null && stateBucket.order[0] === previousIndex) {
            [stateBucket.order[0], stateBucket.order[1]] = [stateBucket.order[1], stateBucket.order[0]];
          }
        }

        const itemIndex = stateBucket.order[stateBucket.cursor];
        stateBucket.cursor += 1;
        return bucket[itemIndex];
      }

      function resetRandomState() {
        for (const column of Object.keys(randomState)) {
          randomState[column].order = [];
          randomState[column].cursor = 0;
        }
      }

      function renderChipRow(target, items) {
        target.innerHTML = items.map((item) => `<span>${escapeHtml(item)}</span>`).join("");
      }

      function renderRows() {
        rows.innerHTML = getEntries()
          .map(
            (entry) => `
              <tr>
                <td>
                  <code>${escapeHtml(entry.plain)}</code>
                  <div class="cell-actions">
                    <button class="copy-btn" type="button" data-copy="${escapeHtml(entry.plain)}" data-label-key="plain">${t().copyRow}</button>
                  </div>
                </td>
                <td>
                  <code>${escapeHtml(entry.anchor)}</code>
                  <div class="cell-actions">
                    <button class="copy-btn" type="button" data-copy="${escapeHtml(entry.anchor)}" data-label-key="anchor">${t().copyRow}</button>
                  </div>
                </td>
                <td>
                  <div>${entry.anchor}</div>
                  <div class="cell-actions">
                    <button class="copy-btn" type="button" data-copy="${escapeHtml(entry.rendered)}" data-label-key="rendered">${t().copyRow}</button>
                  </div>
                </td>
                <td>
                  <div>${entry.anchor}</div>
                  <div class="cell-actions">
                    <button
                      class="copy-btn"
                      type="button"
                      data-copy-rich-html="${escapeHtml(entry.richHtml)}"
                      data-copy-rich-text="${escapeHtml(entry.richText)}"
                      data-label-key="rich"
                    >${t().copyRow}</button>
                  </div>
                </td>
              </tr>
            `
          )
          .join("");
      }

      function applyLanguage() {
        document.documentElement.lang = state.language === "en" ? "en" : "zh-CN";
        document.title = t().title;
        document.getElementById("breadcrumbs-home").textContent = t().breadcrumbsHome;
        document.getElementById("site-name-inline").textContent = t().siteName;
        document.getElementById("page-title").textContent = t().title;
        document.getElementById("target-label").textContent = t().targetLabel;
        document.getElementById("page-summary").textContent = t().summary;
        document.getElementById("meta-description").innerHTML = t().metaDescription;
        document.getElementById("keyword-label").textContent = t().keywordLabel;
        document.getElementById("intent-label").textContent = t().intentLabel;
        document.getElementById("th-plain").textContent = t().tableHeaders.plain;
        document.getElementById("th-anchor").textContent = t().tableHeaders.anchor;
        document.getElementById("th-rendered").textContent = t().tableHeaders.rendered;
        document.getElementById("th-rich").textContent = t().tableHeaders.rich;
        document.getElementById("random-plain").textContent = t().randomButton;
        document.getElementById("random-anchor").textContent = t().randomButton;
        document.getElementById("random-rendered").textContent = t().randomButton;
        document.getElementById("random-rich").textContent = t().randomButton;
        renderChipRow(keywordChips, t().keywords);
        renderChipRow(intentChips, t().intents);
        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.classList.toggle("is-active", button.getAttribute("data-lang") === state.language);
        });
        renderRows();
      }

      function setActiveLanguage(lang) {
        state.language = lang;
        localStorage.setItem(STORAGE_KEY, lang);
        resetRandomState();
        applyLanguage();
        setStatus(t().initialStatus);
      }

      rows.addEventListener("click", async (event) => {
        const richButton = event.target.closest("[data-copy-rich-html]");
        if (richButton) {
          const entries = getEntries();
          const label = t().copyLabels[richButton.getAttribute("data-label-key")];
          await copyRichText(
            richButton.getAttribute("data-copy-rich-html"),
            richButton.getAttribute("data-copy-rich-text"),
            t().copySuccess(label, entries.length)
          );
          return;
        }

        const button = event.target.closest("[data-copy]");
        if (!button) {
          return;
        }

        const entries = getEntries();
        const label = t().copyLabels[button.getAttribute("data-label-key")];
        await copyText(button.getAttribute("data-copy"), t().copySuccess(label, entries.length));
      });

      document.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-random-column]");
        if (!button) {
          return;
        }

        const column = button.getAttribute("data-random-column");
        const randomEntry = getNextRandomEntry(column);
        if (!randomEntry) {
          return;
        }

        const entries = getEntries();
        const label = t().randomLabels[column];

        if (column === "rich") {
          await copyRichText(randomEntry.richHtml, randomEntry.richText, t().copySuccess(label, entries.length));
          return;
        }

        await copyText(randomEntry[column], t().copySuccess(label, entries.length));
      });

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => setActiveLanguage(button.getAttribute("data-lang")));
      });

      state.language = getSavedLanguage();
      applyLanguage();
      setStatus(t().initialStatus);
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyon Hotel Outreach Copy</title>
    <link rel="stylesheet" href="../../../assets/hub.css" />
  </head>
  <body data-page-key="hotel">
    <main>
      <div class="topbar">
        <div class="lang-switch" aria-label="Language switcher">
          <button class="lang-btn" type="button" data-lang="zh">中文</button>
          <button class="lang-btn" type="button" data-lang="en">English</button>
        </div>
      </div>
      <section class="panel">
        <p class="breadcrumbs"><a href="../../../" id="breadcrumbs-home"></a> / <a href="../" id="breadcrumbs-site"></a> / <span id="site-name-inline"></span></p>
        <h1 id="page-title"></h1>
        <p><span id="target-label"></span><a id="target-link" href=""></a></p>
        <p id="page-summary"></p>
        <div class="meta">
          <p id="meta-description"></p>
          <div><strong id="keyword-label"></strong><div class="keywords" id="keyword-chips"></div></div>
          <div><strong id="intent-label"></strong><div class="keywords" id="intent-chips"></div></div>
        </div>
        <p class="status" id="status"></p>
        <div class="table-wrap">
          <table>
            <thead><tr><th><div class="th-head"><span class="th-label" id="th-plain"></span><button class="copy-btn" type="button" data-random-column="plain"></button></div></th><th><div class="th-head"><span class="th-label" id="th-anchor"></span><button class="copy-btn" type="button" data-random-column="anchor"></button></div></th><th><div class="th-head"><span class="th-label" id="th-rendered"></span><button class="copy-btn" type="button" data-random-column="rendered"></button></div></th><th><div class="th-head"><span class="th-label" id="th-rich"></span><button class="copy-btn" type="button" data-random-column="rich"></button></div></th></tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="../../../assets/lyon-pages.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outreach Copy Hub</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --line: #d8cfbf;
        --text: #2a2118;
        --muted: #726252;
        --link: #8e2c27;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fff7ea 0, transparent 28%),
          linear-gradient(180deg, #f7f1e6 0%, #efe7da 100%);
        color: var(--text);
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 36px 20px 48px;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 14px;
      }

      .lang-switch {
        display: inline-flex;
        gap: 8px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 251, 244, 0.88);
      }

      .lang-btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 999px;
        background: transparent;
        color: #5d493b;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .lang-btn.is-active {
        background: linear-gradient(180deg, #a53a34 0%, #7e1f1b 100%);
        color: #fff7ef;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(73, 53, 31, 0.08);
      }

      .hero {
        padding: 28px;
        margin-bottom: 22px;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .summary {
        display: grid;
        gap: 12px;
      }

      .panel {
        padding: 22px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
      }

      .section-note {
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 251, 244, 0.94);
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .meta {
        display: grid;
        gap: 6px;
        margin: 14px 0 18px;
        font-size: 14px;
        color: var(--muted);
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fbf6ee;
        font-size: 12px;
        color: #4a3a2e;
      }

      .primary-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #9a3a33;
        background: linear-gradient(180deg, #a53a34 0%, #7e1f1b 100%);
        color: #fff7ef;
        text-decoration: none;
        font-size: 14px;
      }

      .primary-link:hover {
        opacity: 0.92;
      }

      a {
        color: var(--link);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="lang-switch" aria-label="Language switcher">
          <button class="lang-btn" type="button" data-lang="zh">中文</button>
          <button class="lang-btn" type="button" data-lang="en">English</button>
        </div>
      </div>

      <section class="hero">
        <div class="summary">
          <h1 id="hero-title">Outreach Copy Hub</h1>
          <p id="hero-body-1"></p>
          <p id="hero-body-2"></p>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 id="section-title"></h2>
          <p class="section-note" id="section-note"></p>
        </div>

        <div class="grid">
          <article class="card">
            <h3>GetCursiveText</h3>
            <p id="card-getcursive-desc"></p>
            <div class="meta">
              <div><span id="site-label-1"></span><a href="https://getcursivetext.com/">https://getcursivetext.com/</a></div>
              <div><span id="entry-label-1"></span><a href="./sites/getcursivetext/">/sites/getcursivetext/</a></div>
            </div>
            <div class="badge-row">
              <span class="badge" id="badge-getcursive-1"></span>
              <span class="badge" id="badge-getcursive-2"></span>
              <span class="badge" id="badge-getcursive-3"></span>
              <span class="badge" id="badge-getcursive-4"></span>
            </div>
            <div style="margin-top: 18px">
              <a class="primary-link" href="./sites/getcursivetext/" id="cta-getcursive"></a>
            </div>
          </article>

          <article class="card">
            <h3>リヨン完全ガイド</h3>
            <p id="card-lyon-desc"></p>
            <div class="meta">
              <div><span id="site-label-2"></span><a href="https://xn--cekd2a.net/">https://xn--cekd2a.net/</a></div>
              <div><span id="entry-label-2"></span><a href="./sites/lyon-guide/">/sites/lyon-guide/</a></div>
            </div>
            <div class="badge-row">
              <span class="badge" id="badge-lyon-1"></span>
              <span class="badge" id="badge-lyon-2"></span>
              <span class="badge" id="badge-lyon-3"></span>
              <span class="badge" id="badge-lyon-4"></span>
            </div>
            <div style="margin-top: 18px">
              <a class="primary-link" href="./sites/lyon-guide/" id="cta-lyon"></a>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "outreach-copy-hub-language";
      const translations = {
        zh: {
          title: "Outreach Copy Hub",
          hero1:
            "这是一个面向多个网站的外链建设工作台。每个网站先进入站点页索引，再进入对应页面的外链文案库，适合按 landing page 精准做外链。",
          hero2:
            "后续新增项目时，按同样方式增加站点入口页和页面库即可。当前已接入 GetCursiveText 与里昂旅行站，其中里昂站已拆成 6 个页面库，总计 200 条文案。",
          sectionTitle: "网站项目入口",
          sectionNote: "当前已接入 2 个站点",
          siteLabel: "站点：",
          entryLabel: "入口：",
          getcursiveDesc:
            "针对 `https://getcursivetext.com/` 的站点入口页，当前收录 1 个页面库：首页，内置 10 个 SEO 关键词筛选与 100 条文案。",
          getcursiveBadges: ["1 个页面库", "10 个关键词", "100 条文案", "关键词过滤"],
          getcursiveCta: "进入站点页索引",
          lyonDesc:
            "针对 `https://xn--cekd2a.net/` 的站点入口页，现已按首页、酒店、机场、巴黎到里昂、美食、模型路线拆成 6 个页面库，总计 200 条文案。",
          lyonBadges: ["6 个页面库", "200 条文案", "按页面分流", "富文本复制"],
          lyonCta: "进入站点页索引",
        },
        en: {
          title: "Outreach Copy Hub",
          hero1:
            "This is a multi-site outreach copy workspace. Each website now has a site index first, then page-level outreach libraries underneath it, so backlinks can map to the right landing page.",
          hero2:
            "When you add another project later, follow the same pattern: add a site index and then page-level libraries. The hub currently includes GetCursiveText and a Japanese Lyon travel site, with Lyon split into 6 page libraries and 200 total entries.",
          sectionTitle: "Project Entrypoints",
          sectionNote: "2 sites currently connected",
          siteLabel: "Site: ",
          entryLabel: "Entry: ",
          getcursiveDesc:
            "A site index for `https://getcursivetext.com/`, currently containing 1 homepage library with 10 SEO keyword filters and 100 copy entries.",
          getcursiveBadges: ["1 page library", "10 keywords", "100 copy lines", "Keyword filter"],
          getcursiveCta: "Open site index",
          lyonDesc:
            "A site index for `https://xn--cekd2a.net/`, now split into 6 page libraries covering the homepage, hotel, airport, Paris-to-Lyon, gourmet, and model-course pages with 200 total entries.",
          lyonBadges: ["6 page libraries", "200 copy lines", "Page-specific targeting", "Rich text copy"],
          lyonCta: "Open site index",
        },
      };

      function getSavedLanguage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved === "en" ? "en" : "zh";
      }

      function setActiveLanguage(lang) {
        const copy = translations[lang];
        document.documentElement.lang = lang === "en" ? "en" : "zh-CN";
        document.title = copy.title;
        document.getElementById("hero-title").textContent = copy.title;
        document.getElementById("hero-body-1").textContent = copy.hero1;
        document.getElementById("hero-body-2").textContent = copy.hero2;
        document.getElementById("section-title").textContent = copy.sectionTitle;
        document.getElementById("section-note").textContent = copy.sectionNote;
        document.getElementById("site-label-1").textContent = copy.siteLabel;
        document.getElementById("entry-label-1").textContent = copy.entryLabel;
        document.getElementById("site-label-2").textContent = copy.siteLabel;
        document.getElementById("entry-label-2").textContent = copy.entryLabel;
        document.getElementById("card-getcursive-desc").textContent = copy.getcursiveDesc;
        document.getElementById("card-lyon-desc").textContent = copy.lyonDesc;
        document.getElementById("cta-getcursive").textContent = copy.getcursiveCta;
        document.getElementById("cta-lyon").textContent = copy.lyonCta;

        copy.getcursiveBadges.forEach((badge, index) => {
          document.getElementById(`badge-getcursive-${index + 1}`).textContent = badge;
        });
        copy.lyonBadges.forEach((badge, index) => {
          document.getElementById(`badge-lyon-${index + 1}`).textContent = badge;
        });

        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.classList.toggle("is-active", button.getAttribute("data-lang") === lang);
        });
        localStorage.setItem(STORAGE_KEY, lang);
      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => setActiveLanguage(button.getAttribute("data-lang")));
      });

      setActiveLanguage(getSavedLanguage());
    </script>
  </body>
</html>
